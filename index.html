<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>ROKA EDU-PASS 2026</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-color: #FF9800; 
            --bg-color: #f8f9fa; 
            --category-bg: #5D4037; 
            --modal-bg: rgba(0,0,0,0.7); 
            --margin-1cm: 35px; /* 약 1cm 여백 */
        }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Noto Sans KR', sans-serif; 
            background: #333; /* PC 배경은 어둡게 */
            display: flex; justify-content: center;
        }

        .app-shell {
            width: 100%; max-width: 500px; height: 100%;
            display: flex; flex-direction: column; position: relative;
            background: var(--bg-color); /* 앱 본체 배경 */
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        .page { display: none; width: 100%; height: 100%; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .active { display: flex; }

        /* [1페이지: 인트로] */
        #intro-page { justify-content: space-between; align-items: center; }
        .intro-content { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            transform: translateY(-50px);
        }
        .main-title { font-size: 20px; font-weight: 700; color: #444; margin-bottom: 5px; }
        .sub-title { font-size: 28px; font-weight: 800; color: var(--category-bg); margin: 0; }
        .sun-icon { font-size: 55px; margin: 20px 0 35px 0; }
        button.primary { 
            width: 85%; padding: 18px; background: var(--main-color); 
            color: white; border: none; border-radius: 15px; font-size: 19px; font-weight: bold; cursor: pointer;
        }

        /* [2페이지: 메인목록] */
        #main-page { 
            padding-top: var(--margin-1cm); 
            justify-content: flex-start;
        }
        .edu-list-wrapper {
            flex: 1; display: flex; flex-direction: column; 
            justify-content: flex-start; /* PC에서도 벌어지지 않게 상단 정렬 */
            gap: 15px; /* 카테고리 간 모바일 수준의 적당한 여백 */
            margin-bottom: var(--margin-1cm); /* 하단 버튼과 1cm 여백 */
        }
        .category-group { display: flex; flex-direction: column; gap: 5px; }
        .category-header { background: var(--category-bg); color: white; padding: 7px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; }
        .edu-item { background: white; padding: 9px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .edu-info h4 { margin: 0 0 3px 0; font-size: 14px; color: #222; line-height: 1.2; }

        .btn-schedule { background: #6c757d; color: white; border: none; border-radius: 4px; padding: 3px 8px; font-size: 10px; cursor: pointer; font-weight: bold; }
        .btn-link { padding: 9px 18px; background: #fff; border-radius: 8px; text-decoration: none; color: var(--main-color); font-size: 12px; font-weight: bold; border: 2px solid var(--main-color); white-space: nowrap; }
        .btn-link.completed { background: #f0f0f0; color: #aaa; border: 2px solid #ddd; }

        /* 하단 영역 및 문구 크기 복구 */
        .bottom-area { width: 100%; text-align: center; }
        .security-banner { 
            background: #fff; padding: 12px; border-radius: 10px; 
            font-size: 11px; /* 폰트 크기 이전 버전으로 복구 */
            color: #444; text-align: left; line-height: 1.5; 
            border: 1px solid #ddd; margin-bottom: 8px; font-weight: 400;
        }
        .btn-bottom-group { display: flex; gap: 8px; justify-content: center; margin-bottom: 6px; }
        .btn-mini { background:none; border:1px solid #ccc; padding:6px 14px; font-size:11px; border-radius:12px; color:#777; cursor:pointer; }
        .copyright { font-size: 10px; color: #bbb; padding-bottom: env(safe-area-inset-bottom, 10px); }

        /* 모달 유지 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 8px 4px; text-align: center; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div id="intro-page" class="page active">
            <div class="intro-content">
                <div class="main-title">2026 육군 교육 통합 관리 시스템</div>
                <div class="sub-title">ROKA EDU-PASS</div>
                <div class="sun-icon">☀️</div>
                <button class="primary" onclick="startApp()">시작하기</button>
            </div>
            <div class="bottom-area">
                <div class="security-banner">
                    본 시스템은 사용자의 기기에 데이터를 저장하고, 보안 방어벽을 적용하여 개인정보 유출의 위험이 없으며, 수강완료 체크시 해당 브라우저(PC/모바일)에 기록되어 보존됩니다.
                </div>
                <div class="copyright">Copyright © jm.p</div>
            </div>
        </div>

        <div id="main-page" class="page">
            <div id="edu-container" class="edu-list-wrapper">
                </div>
            
            <div class="bottom-area">
                <div class="btn-bottom-group">
                    <button class="btn-mini" onclick="location.reload()">메인화면</button>
                    <button class="btn-mini" style="border-color:#ffcdd2; color:#e57373;" onclick="safeReset()">기록초기화</button>
                </div>
                <div class="copyright">Copyright © jm.p</div>
            </div>
        </div>
    </div>

    <div id="schedule-modal" class="modal" onclick="if(event.target===this) closeModal()">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-top:0; font-size:15px; border-left:4px solid var(--main-color); padding-left:10px;"></h3>
            <table>
                <thead><tr><th>기수</th><th>기간</th><th>상태</th></tr></thead>
                <tbody id="modal-table-body"></tbody>
            </table>
            <button onclick="closeModal()" style="width:100%; margin-top:15px; padding:10px; border:none; border-radius:10px; background:#f0f0f0; font-weight:bold; cursor:pointer;">닫기</button>
        </div>
    </div>

    <script>
        // 보안 방어벽 유지
        (function(){ if(self!==top) top.location=self.location; })();

        const TODAY = new Date('2026-03-09');
        const eduData = [
            {
                category: "1. 법정 필수 및 인권 교육",
                items: [
                    { id: "v10_1", title: "성인지 교육 (국방부)", url: "https://mnd.nhi.go.kr" },
                    { id: "v10_2", title: "자살 예방 교육 (생명사랑)", url: "https://mnd.nhi.go.kr" },
                    { id: "v10_3", title: "청렴/부패방지 및 인권", url: "https://mnd.nhi.go.kr" },
                    { id: "v10_4", title: "장애인 인식 개선 교육", url: "https://www.kead.or.kr" }
                ]
            },
            {
                category: "2. 정보보안 및 안전관리 교육",
                items: [
                    { id: "v10_5", title: "정보보안 교육", url: "https://mnd.nhi.go.kr" },
                    { id: "v10_6", title: "육군 안전관리교육(안전관리자)", url: "http://safety.step.or.kr" },
                    { id: "v10_7", title: "육군 안전관리교육(안전실무자)", url: "http://safety.step.or.kr" }
                ]
            },
            {
                category: "3. 직무 및 기타 안전",
                items: [
                    { id: "v10_8", title: "산업안전보건 교육", url: "http://edu.kosha.or.kr" }
                ]
            }
        ];

        function getDoneList() { try { return JSON.parse(localStorage.getItem('roka_v10_data') || "[]"); } catch(e) { return []; } }
        
        function toggleComplete(id) {
            let list = getDoneList();
            list = list.includes(id) ? list.filter(i => i !== id) : [...list, id];
            localStorage.setItem('roka_v10_data', JSON.stringify(list));
            renderMain();
        }

        function renderMain() {
            const container = document.getElementById('edu-container');
            const doneList = getDoneList();
            container.innerHTML = "";
            eduData.forEach(cat => {
                const group = document.createElement('div');
                group.className = 'category-group';
                let html = `<div class="category-header">${cat.category}</div>`;
                cat.items.forEach(item => {
                    const isDone = doneList.includes(item.id);
                    html += `
                        <div class="edu-item">
                            <div class="edu-info">
                                <h4 style="${isDone?'color:#bbb;text-decoration:line-through;':''}">${item.title}</h4>
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <button class="btn-schedule" onclick="openSchedule('${item.title}')">기수일정</button>
                                    <label style="font-size:10px; color:#999; cursor:pointer;"><input type="checkbox" ${isDone?'checked':''} onchange="toggleComplete('${item.id}')"> 완료</label>
                                </div>
                            </div>
                            <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="btn-link ${isDone?'completed':''}">수강하기</a>
                        </div>`;
                });
                group.innerHTML = html;
                container.appendChild(group);
            });
        }

        function calcStatus(month) {
            const start = new Date(2026, month-1, 1);
            const end = new Date(2026, month, 0);
            const applyEnd = new Date(2026, month-1, 7);
            let res = { text: "기간종료", cls: "#bbb" };
            if (TODAY >= start && TODAY <= applyEnd) res = { text: "신청가능", cls: "#2ecc71" };
            else if (TODAY > applyEnd && TODAY <= end) res = { text: "학습중", cls: "#3498db" };
            return { range: `${month}/1~${month}/${end.getDate()}`, status: res };
        }

        function openSchedule(title) {
            document.getElementById('modal-title').innerText = title;
            const tbody = document.getElementById('modal-table-body');
            tbody.innerHTML = "";
            for (let m = 1; m <= 12; m++) {
                const info = calcStatus(m);
                tbody.innerHTML += `<tr><td>${m}기</td><td>${info.range}</td><td><span style="color:${info.status.cls}; font-weight:bold;">${info.status.text}</span></td></tr>`;
            }
            document.getElementById('schedule-modal').style.display = 'flex';
        }

        function startApp() { 
            document.getElementById('intro-page').classList.remove('active'); 
            document.getElementById('main-page').classList.add('active'); 
            renderMain(); 
        }

        function closeModal() { document.getElementById('schedule-modal').style.display = 'none'; }
        function safeReset() { if(confirm('기록을 초기화할까요?')) { localStorage.removeItem('roka_v10_data'); location.reload(); } }
    </script>
</body>
</html>
