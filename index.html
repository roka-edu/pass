<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROKA EDU-PASS 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-color: #FF9800; 
            --bg-color: #f8f9fa; 
            --category-bg: #5D4037; 
            --modal-bg: rgba(0,0,0,0.6); 
            --error-color: #f44336; 
            --status-green: #2ecc71;
            --status-blue: #3498db;
        }
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; background: var(--bg-color); color: #333; overflow-x: hidden; }
        
        .page { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 15px; box-sizing: border-box; }
        .active { display: flex; }

        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 360px; text-align: center; margin-top: 20px; z-index: 10; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        button.primary { width: 100%; padding: 15px; background: var(--main-color); color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .btn-schedule { width: 115px; height: 32px; background: #6c757d; color: white; border: none; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .btn-link { padding: 10px 35px; background: #fff; border-radius: 8px; text-decoration: none; color: var(--main-color); font-size: 13px; font-weight: bold; border: 2px solid var(--main-color); white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; }
        .btn-link.completed { background: #eee; color: #888; border: 2px solid #ccc; }

        .category-header { width: 100%; max-width: 480px; background: var(--category-bg); color: white; padding: 10px 12px; border-radius: 8px; margin: 12px 0 8px 0; font-weight: bold; font-size: 14px; }
        .edu-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); width: 100%; max-width: 480px; box-sizing: border-box; }
        .edu-info { flex: 1; text-align: left; }
        .edu-info h4 { margin: 0; font-size: 15px; margin-bottom: 8px; line-height: 1.4; color: #222; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; position: relative; overflow-y: auto; max-height: 80vh; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 11px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
        th { background: #f4f4f4; }
        
        .status-badge { padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; font-size: 10px; }
        .status-apply { background: var(--status-green); } /* 신청가능 */
        .status-study { background: var(--status-blue); }  /* 학습중 */
        .status-end { background: #bbb; }                 /* 종료 */

        .footer-area { width: 100%; max-width: 360px; margin-top: auto; padding-bottom: 20px; text-align: center; }
        .copyright { font-size: 12px; color: #bbb; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="login-page" class="page active">
        <div class="card">
            <h1 style="color: var(--category-bg); margin: 0 0 5px 0; font-size: 22px;">☀️ ROKA EDU-PASS</h1>
            <p style="font-size: 13px; color: #888; margin-bottom: 15px;">2026 교육관리 시스템</p>
            <input type="text" id="loginSn" placeholder="군번 (ID)">
            <input type="password" id="loginPw" placeholder="비밀번호">
            <button class="primary" onclick="login()">로그인</button>
            <div id="loginMsg" style="color:red; font-size:12px; margin-top:5px;"></div>
            <div style="margin-top:15px; border-top: 1px solid #eee; padding-top: 15px; display: flex; flex-direction: column; gap: 8px;">
                <button onclick="showPage('signup-page')" style="background: #6c757d; font-size: 13px; border: none; color: white; padding: 10px; border-radius: 8px; cursor: pointer;">신규 회원가입</button>
                <button onclick="showPage('find-page')" style="background: none; font-size: 12px; border: none; color: #999; cursor: pointer; text-decoration: underline;">비밀번호 찾기 / 초기화</button>
            </div>
        </div>
        <div class="footer-area"><div class="copyright">Copyright © jm.p</div></div>
    </div>

    <div id="find-page" class="page"><div class="card"><h2>본인 확인</h2><input type="text" id="findName" placeholder="성명"><input type="text" id="findBirth" placeholder="생년월일 6자리"><button class="primary" onclick="verifyForReset()">확인</button><button onclick="showPage('login-page')" style="background:none; border:none; color:#888; cursor:pointer; margin-top:10px;">취소</button></div></div>
    <div id="reset-page" class="page"><div class="card"><h2>비밀번호 재설정</h2><input type="password" id="newPw" placeholder="새 비밀번호"><input type="password" id="newPwConfirm" placeholder="확인"><button class="primary" onclick="completePasswordReset()">변경 완료</button></div></div>
    <div id="signup-page" class="page"><div class="card"><h2>정보 등록</h2><input type="text" id="regSn" placeholder="군번"><input type="text" id="regRank" placeholder="계급"><input type="text" id="regName" placeholder="성명"><input type="text" id="regBirth" placeholder="생년월일"><input type="password" id="regPw" placeholder="비밀번호"><button class="primary" onclick="register()">가입하기</button><button onclick="showPage('login-page')" style="background:none; border:none; color:#888; cursor:pointer; margin-top:10px;">취소</button></div></div>

    <div id="main-page" class="page">
        <div style="width: 100%; max-width: 480px; text-align: left; padding: 10px 0;">
            <h2 id="welcome-msg" style="margin:0; font-size: 18px;"></h2>
            <p style="color: #FF9800; font-size: 12px; font-weight: bold; margin-top: 5px;">2026 교육일정 (현 시각 기준 실시간 상태)</p>
        </div>
        <div id="edu-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <button onclick="logout()" style="background: none; border: 1px solid #ccc; padding: 8px 20px; font-size: 11px; margin-top: 20px; border-radius: 20px; cursor: pointer; color: #999;">로그아웃</button>
        <div class="copyright" style="margin-top: 20px;">Copyright © jm.p</div>
    </div>

    <div id="schedule-modal" class="modal" onclick="if(event.target===this) closeModal()">
        <div class="modal-content">
            <span style="position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #999;" onclick="closeModal()">&times;</span>
            <h3 id="modal-title" style="margin: 0; font-size: 15px; color: var(--category-bg); border-left: 4px solid var(--main-color); padding-left: 10px; text-align: left;"></h3>
            <p style="font-size: 10px; color: #666; text-align: left; margin-top: 5px;">* 현재 날짜 기준 실시간 상태가 표시됩니다.</p>
            <table>
                <thead><tr><th>기수</th><th>신청기간</th><th>학습기간</th><th>상태</th></tr></thead>
                <tbody id="modal-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // 오늘의 날짜 고정 (사용자 요청 시점: 2026-03-07)
        const TODAY = new Date('2026-03-07');

        const eduCategories = [
            {
                name: "1. 필수교육 (연 24회 기수 편성)",
                type: "human_rights", // 특수 기수 (인권 교육 등)
                items: [
                    { id: "edu_hr1", title: "인권의 이해", url: "https://mnd.nhi.go.kr" },
                    { id: "edu_hr2", title: "군인 인권의 이해", url: "https://mnd.nhi.go.kr" }
                ]
            },
            {
                name: "2. 필수/공통 (연 12회 기수 편성)",
                type: "normal", // 일반 기수
                items: [
                    { id: "edu1", title: "성인지 교육 (국방부 나라배움터)", url: "https://mnd.nhi.go.kr" },
                    { id: "edu2", title: "가정폭력 예방 (국방부 나라배움터)", url: "https://mnd.nhi.go.kr" },
                    { id: "edu3", title: "청렴 및 부패방지 교육", url: "https://mnd.nhi.go.kr" },
                    { id: "edu4", title: "장애인 인식 개선 교육", url: "https://www.kead.or.kr" }
                ]
            }
        ];

        // 수강 완료 데이터 처리
        function getDoneList() {
            const sn = localStorage.getItem('roka_sn');
            return JSON.parse(localStorage.getItem(`done_${sn}`) || "[]");
        }

        function toggleComplete(eduId) {
            const sn = localStorage.getItem('roka_sn');
            let list = getDoneList();
            list = list.includes(eduId) ? list.filter(id => id !== eduId) : [...list, eduId];
            localStorage.setItem(`done_${sn}`, JSON.stringify(list));
            renderMain();
        }

        // 일정 계산 및 상태 반환 함수
        function getScheduleInfo(month, half, type) {
            const year = 2026;
            let applyStart, applyEnd, studyStart, studyEnd;
            const lastDay = new Date(year, month, 0).getDate();

            if (type === 'human_rights') {
                // 인권 교육: 월 2회 (1~15일 / 16~말일)
                if (half === 1) {
                    applyStart = new Date(year, month-1, 1); applyEnd = new Date(year, month-1, 15);
                    studyStart = new Date(year, month-1, 1); studyEnd = new Date(year, month-1, 15);
                } else {
                    applyStart = new Date(year, month-1, 16); applyEnd = new Date(year, month-1, lastDay);
                    studyStart = new Date(year, month-1, 16); studyEnd = new Date(year, month-1, lastDay);
                }
            } else {
                // 일반 교육: 월 1회 (1~7일 신청 / 1~말일 학습)
                applyStart = new Date(year, month-1, 1); applyEnd = new Date(year, month-1, 7);
                studyStart = new Date(year, month-1, 1); studyEnd = new Date(year, month-1, lastDay);
            }

            let status = { text: "종료", class: "status-end" };
            if (TODAY >= applyStart && TODAY <= applyEnd) status = { text: "신청가능", class: "status-apply" };
            else if (TODAY >= studyStart && TODAY <= studyEnd) status = { text: "학습중", class: "status-study" };
            else if (TODAY < applyStart) status = { text: "대기", class: "status-end" };

            const formatDate = (d) => `${d.getMonth()+1}/${d.getDate()}`;
            return {
                apply: `${formatDate(applyStart)}~${formatDate(applyEnd)}`,
                study: `${formatDate(studyStart)}~${formatDate(studyEnd)}`,
                status: status
            };
        }

        function renderMain() {
            document.getElementById('welcome-msg').innerText = `${localStorage.getItem('roka_rank')} ${localStorage.getItem('roka_name')}님`;
            const container = document.getElementById('edu-container');
            const doneList = getDoneList();
            container.innerHTML = "";

            eduCategories.forEach(cat => {
                const h = document.createElement('div'); h.className = 'category-header'; h.innerText = cat.name;
                container.appendChild(h);
                cat.items.forEach(item => {
                    const isDone = doneList.includes(item.id);
                    const i = document.createElement('div');
                    i.className = 'edu-item';
                    i.innerHTML = `
                        <div class="edu-info">
                            <h4 style="${isDone ? 'color:#888; text-decoration:line-through;' : ''}">${item.title}</h4>
                            <button class="btn-schedule" onclick="openSchedule('${item.title}', '${cat.type}')">일정/기수조회</button><br>
                            <button onclick="toggleComplete('${item.id}')" style="font-size:10px; border:none; background:none; color:${isDone ? '#4CAF50' : '#999'}; cursor:pointer; font-weight:bold; padding:0;">
                                ${isDone ? '✅ 수강완료 취소' : '⬜ 완료 시 클릭'}
                            </button>
                        </div>
                        <a href="${item.url}" target="_blank" class="btn-link ${isDone ? 'completed' : ''}">
                            ${isDone ? '수강완료' : '수강하기'}
                        </a>
                    `;
                    container.appendChild(i);
                });
            });
        }

        function openSchedule(title, type) {
            document.getElementById('modal-title').innerText = title;
            const tbody = document.getElementById('modal-table-body');
            tbody.innerHTML = "";

            if (type === 'human_rights') {
                // 인권 교육: 1~24기 (월 2회)
                for (let m = 1; m <= 12; m++) {
                    for (let h = 1; h <= 2; h++) {
                        const gisu = (m - 1) * 2 + h;
                        const info = getScheduleInfo(m, h, type);
                        tbody.innerHTML += `<tr><td>${gisu}기</td><td>${info.apply}</td><td>${info.study}</td><td><span class="status-badge ${info.status.class}">${info.status.text}</span></td></tr>`;
                    }
                }
            } else {
                // 일반 교육: 1~12기 (월 1회)
                for (let m = 1; m <= 12; m++) {
                    const info = getScheduleInfo(m, 1, type);
                    tbody.innerHTML += `<tr><td>${m}기</td><td>${info.apply}</td><td>${info.study}</td><td><span class="status-badge ${info.status.class}">${info.status.text}</span></td></tr>`;
                }
            }
            document.getElementById('schedule-modal').style.display = 'flex';
        }

        // 공통 기능들
        function showPage(pId) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(pId).classList.add('active'); }
        function closeModal() { document.getElementById('schedule-modal').style.display = 'none'; }
        function logout() { showPage('login-page'); }
        function login() {
            const sn = document.getElementById('loginSn').value;
            const pw = document.getElementById('loginPw').value;
            if(sn === localStorage.getItem('roka_sn') && pw === localStorage.getItem('roka_pw')) { showPage('main-page'); renderMain(); }
            else { document.getElementById('loginMsg').innerText="정보 불일치"; }
        }
        function register() {
            localStorage.setItem('roka_sn', document.getElementById('regSn').value);
            localStorage.setItem('roka_rank', document.getElementById('regRank').value);
            localStorage.setItem('roka_name', document.getElementById('regName').value);
            localStorage.setItem('roka_birth', document.getElementById('regBirth').value);
            localStorage.setItem('roka_pw', document.getElementById('regPw').value);
            alert("가입완료"); showPage('login-page');
        }
        function verifyForReset() {
            if(document.getElementById('findName').value === localStorage.getItem('roka_name')) showPage('reset-page');
            else alert("정보 불일치");
        }
        function completePasswordReset() {
            localStorage.setItem('roka_pw', document.getElementById('newPw').value);
            alert("변경완료"); showPage('login-page');
        }
    </script>
</body>
</html>
