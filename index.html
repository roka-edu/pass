<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROKA EDU-PASS 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-color: #FF9800; 
            --bg-color: #f8f9fa; 
            --category-bg: #5D4037; 
            --modal-bg: rgba(0,0,0,0.7); 
            --status-green: #2ecc71;
            --status-blue: #3498db;
            --status-gray: #bbb;
        }
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; background: var(--bg-color); color: #333; overflow-x: hidden; }
        
        /* 공통 페이지 구조 */
        .page { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        /* 인트로 카드 (중앙 배치) */
        .card { 
            background: white; padding: 40px 25px; border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; max-width: 360px; text-align: center; 
            margin-top: 75px; /* 약 2cm 상단 여백 */
        }

        button.primary { 
            width: 100%; padding: 18px; background: var(--main-color); 
            color: white; border: none; border-radius: 12px; 
            font-size: 18px; font-weight: bold; cursor: pointer; 
            transition: transform 0.2s; 
        }
        button.primary:active { transform: scale(0.98); }
        
        /* 하단 영역 고정 */
        .bottom-area { width: 100%; max-width: 360px; margin-top: auto; padding-top: 20px; }
        .security-banner { background: #eee; padding: 15px; border-radius: 12px; font-size: 11px; color: #666; text-align: left; line-height: 1.6; border-bottom: 3px solid #ddd; margin-bottom: 10px; }
        .copyright { font-size: 12px; color: #bbb; margin-bottom: 10px; text-align: center; }

        /* 메인 교육 목록 리스트 */
        .edu-list-container { width: 100%; max-width: 480px; flex-grow: 1; margin-top: 20px; }
        .category-header { background: var(--category-bg); color: white; padding: 12px; border-radius: 8px; margin: 20px 0 10px 0; font-weight: bold; font-size: 14px; }
        .edu-item { background: white; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .edu-info { flex: 1; text-align: left; }
        .edu-info h4 { margin: 0 0 10px 0; font-size: 15px; color: #222; line-height: 1.4; }

        .btn-schedule { background: #6c757d; color: white; border: none; border-radius: 6px; padding: 6px 12px; font-size: 11px; cursor: pointer; font-weight: bold; }
        .btn-link { padding: 12px 25px; background: #fff; border-radius: 10px; text-decoration: none; color: var(--main-color); font-size: 13px; font-weight: bold; border: 2px solid var(--main-color); transition: all 0.2s; }
        .btn-link.completed { background: #f0f0f0; color: #aaa; border: 2px solid #ddd; }

        /* 교육일정 모달 (정중앙 배치 교정) */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--modal-bg); z-index: 1000; 
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .modal-content { 
            background: white; padding: 25px; border-radius: 20px; 
            width: 100%; max-width: 450px; position: relative; 
            max-height: 80vh; overflow-y: auto; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px 5px; text-align: center; }
        th { background: #f8f9fa; color: #666; font-weight: bold; }
        
        .status-badge { padding: 3px 8px; border-radius: 5px; color: white; font-weight: bold; font-size: 10px; white-space: nowrap; }
        .status-apply { background: var(--status-green); } 
        .status-study { background: var(--status-blue); }  
        .status-end { background: var(--status-gray); }
    </style>
</head>
<body>

    <div id="intro-page" class="page active">
        <div class="card">
            <h1 style="color: var(--category-bg); margin: 0; font-size: 26px;">☀️ ROKA EDU-PASS</h1>
            <p style="font-size: 14px; color: #888; margin: 10px 0 30px 0;">2026 육군 교육 통합 관리 시스템</p>
            <button class="primary" onclick="startApp()">시작하기</button>
        </div>
        
        <div class="bottom-area">
            <div class="security-banner">
                <strong>🛡️ 데이터 보존 안내</strong><br>
                본 앱은 별도의 가입 없이 기기에 데이터를 저장합니다. **수강 완료 체크 시 해당 브라우저(PC/모바일)에 정보가 기록**되어 언제든 다시 확인할 수 있습니다.
            </div>
            <div class="copyright">Copyright © jm.p</div>
        </div>
    </div>

    <div id="main-page" class="page" style="justify-content: flex-start;">
        <div style="width: 100%; max-width: 480px; text-align: left; padding: 10px 0;">
            <h2 style="margin:0; font-size: 20px;">🎖️ 교육 현황판</h2>
            <p style="color: var(--main-color); font-size: 12px; font-weight: bold; margin-top: 5px;">실시간 신청 기간 및 학습 상태 반영</p>
        </div>
        
        <div id="edu-container" class="edu-list-container"></div>
        
        <div class="copyright" style="margin: 40px 0 20px 0;">Copyright © jm.p</div>
    </div>

    <div id="schedule-modal" class="modal" onclick="if(event.target===this) closeModal()">
        <div class="modal-content">
            <span style="position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #bbb;" onclick="closeModal()">&times;</span>
            <h3 id="modal-title" style="margin: 0 0 15px 0; font-size: 16px; color: var(--category-bg); border-left: 5px solid var(--main-color); padding-left: 12px; text-align: left;"></h3>
            <table>
                <thead>
                    <tr>
                        <th>기수</th>
                        <th>신청/학습기간</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody id="modal-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // 2026년 3월 7일 기준 시스템 날짜
        const TODAY = new Date('2026-03-07');

        const eduData = [
            {
                category: "1. 인권 교육 (월 2회 기수)",
                type: "half_month", 
                items: [
                    { id: "hr1", title: "인권의 이해", url: "https://mnd.nhi.go.kr" },
                    { id: "hr2", title: "군인 인권의 이해", url: "https://mnd.nhi.go.kr" }
                ]
            },
            {
                category: "2. 법정 필수 교육 (월 1회 기수)",
                type: "full_month",
                items: [
                    { id: "req1", title: "성인지 교육 (국방부 나라배움터)", url: "https://mnd.nhi.go.kr" },
                    { id: "req2", title: "가정폭력 예방 교육", url: "https://mnd.nhi.go.kr" },
                    { id: "req3", title: "청렴 및 부패방지 교육", url: "https://mnd.nhi.go.kr" },
                    { id: "req4", title: "자살 예방 교육 (생명사랑)", url: "https://mnd.nhi.go.kr" },
                    { id: "req5", title: "장애인 인식 개선 교육", url: "https://www.kead.or.kr" }
                ]
            },
            {
                category: "3. 기타 및 직무 교육",
                type: "full_month",
                items: [
                    { id: "etc1", title: "산업안전보건 교육", url: "https://www.kosha.or.kr" }
                ]
            }
        ];

        // 수강 완료 상태 저장/불러오기 (기기 로컬 저장소 활용)
        function getDoneList() {
            return JSON.parse(localStorage.getItem('roka_done_v2') || "[]");
        }

        function toggleComplete(id) {
            let list = getDoneList();
            list = list.includes(id) ? list.filter(i => i !== id) : [...list, id];
            localStorage.setItem('roka_done_v2', JSON.stringify(list));
            renderMain();
        }

        // 기간에 따른 상태 계산 (신청/학습 기간 통합 표시)
        function calcStatus(month, part, type) {
            const year = 2026;
            const lastDay = new Date(year, month, 0).getDate();
            let start, end, applyEnd;

            if (type === 'half_month') {
                // 인권교육: 1~15일 / 16~말일
                start = new Date(year, month-1, part === 1 ? 1 : 16);
                end = new Date(year, month-1, part === 1 ? 15 : lastDay);
                applyEnd = end; // 신청기간과 학습기간이 동일한 구조로 설정
            } else {
                // 일반교육: 1~7일 신청 / 1~말일 학습
                start = new Date(year, month-1, 1);
                end = new Date(year, month-1, lastDay);
                applyEnd = new Date(year, month-1, 7);
            }

            let res = { text: "기간종료", cls: "status-end" };
            if (TODAY >= start && TODAY <= applyEnd) {
                res = { text: "신청가능", cls: "status-apply" };
            } else if (TODAY > applyEnd && TODAY <= end) {
                res = { text: "학습진행중", cls: "status-study" };
            } else if (TODAY < start) {
                res = { text: "대기", cls: "status-end" };
            }

            const fmt = (d) => `${d.getMonth()+1}/${d.getDate()}`;
            return { range: `${fmt(start)} ~ ${fmt(end)}`, status: res };
        }

        function renderMain() {
            const container = document.getElementById('edu-container');
            const doneList = getDoneList();
            container.innerHTML = "";

            eduData.forEach(cat => {
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerText = cat.category;
                container.appendChild(header);

                cat.items.forEach(item => {
                    const isDone = doneList.includes(item.id);
                    const div = document.createElement('div');
                    div.className = 'edu-item';
                    div.innerHTML = `
                        <div class="edu-info">
                            <h4 style="${isDone ? 'color:#bbb; text-decoration:line-through;' : ''}">${item.title}</h4>
                            <button class="btn-schedule" onclick="openSchedule('${item.title}', '${cat.type}')">교육일정/기수</button>
                            <label style="margin-left:10px; font-size:11px; color:#999; cursor:pointer;">
                                <input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleComplete('${item.id}')"> 완료
                            </label>
                        </div>
                        <a href="${item.url}" target="_blank" class="btn-link ${isDone ? 'completed' : ''}">
                            ${isDone ? '수강완료' : '수강하기'}
                        </a>
                    `;
                    container.appendChild(div);
                });
            });
        }

        function openSchedule(title, type) {
            document.getElementById('modal-title').innerText = title;
            const tbody = document.getElementById('modal-table-body');
            tbody.innerHTML = "";

            if (type === 'half_month') {
                for (let m = 1; m <= 12; m++) {
                    for (let p = 1; p <= 2; p++) {
                        const info = calcStatus(m, p, type);
                        tbody.innerHTML += `<tr><td>${(m-1)*2+p}기</td><td>${info.range}</td><td><span class="status-badge ${info.status.cls}">${info.status.text}</span></td></tr>`;
                    }
                }
            } else {
                for (let m = 1; m <= 12; m++) {
                    const info = calcStatus(m, 1, type);
                    tbody.innerHTML += `<tr><td>${m}기</td><td>${info.range}</td><td><span class="status-badge ${info.status.cls}">${info.status.text}</span></td></tr>`;
                }
            }
            document.getElementById('schedule-modal').style.display = 'flex';
        }

        function startApp() {
            document.getElementById('intro-page').classList.remove('active');
            document.getElementById('main-page').classList.add('active');
            renderMain();
        }

        function closeModal() {
            document.getElementById('schedule-modal').style.display = 'none';
        }

        window.scrollTo(0,0);
    </script>
</body>
</html>
